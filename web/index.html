<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="flutter-web-renderer" content="canvaskit">

  <!-- Для гостей: полное отключение PWA (нет кэша, нет "Установить") -->
  <!-- Для админки: PWA включается только при ?admin в URL -->
  <script>
    (function() {
      const isAdmin = new URLSearchParams(window.location.search).has('admin');
      if (isAdmin) {
        // Для админки — добавляем meta для PWA и manifest
        var meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#141414';
        document.head.appendChild(meta);

        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'manifest.json';
        document.head.appendChild(link);

        // Регистрируем service worker для админки через flutter bootstrap
        // (современный способ — flutter.js сам зарегистрирует SW)
        var adminMeta = document.createElement('meta');
        adminMeta.name = 'flutter-web-renderer';
        adminMeta.content = 'canvaskit';
        document.head.appendChild(adminMeta);

        // Заголовок страницы
        document.title = 'Каркыра — Админ';
      } else {
        // Для гостей — НЕ регистрируем service worker,
        // активно удаляем старые регистрации если есть
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var r of registrations) { r.unregister(); }
          });
        }
        // Запрет кэширования для гостей
        var noCache = document.createElement('meta');
        noCache.httpEquiv = 'Cache-Control';
        noCache.content = 'no-cache, no-store, must-revalidate';
        document.head.appendChild(noCache);

        document.title = 'Каркыра — Ресто-Чайхана';
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
