<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="flutter-web-renderer" content="canvaskit">

  <!-- Для гостей: полное отключение PWA (нет кэша, нет "Установить") -->
  <!-- Для админки: PWA включается только при ?admin в URL -->
  <script>
    (function() {
      const isAdmin = new URLSearchParams(window.location.search).has('admin');
      if (isAdmin) {
        var meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#141414';
        document.head.appendChild(meta);

        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'manifest.json';
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('pwa_sw.js').then((registration) => {
            console.log('PWA ServiceWorker registered');
          });
        }
        document.title = 'Каркыра — Админ';
      } else {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var r of registrations) { r.unregister(); }
          });
        }
        document.title = 'Каркыра — Ресто-Чайхана';
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    body { background-color: #141414; margin: 0; padding: 0; }
    .main-loader {
      display: flex; justify-content: center; align-items: center;
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #141414; z-index: 9999;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(212, 160, 67, 0.2);
      border-radius: 50%; border-top-color: #D4A043;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-content { text-align: center; }
    .loader-text {
      color: #D4A043; font-family: sans-serif; margin-top: 16px;
      font-size: 14px; letter-spacing: 4px; opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="main-loader" id="loading-indicator">
    <div class="loader-content">
      <div class="spinner"></div>
      <div class="loader-text">KARK YRA</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
