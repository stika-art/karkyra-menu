<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="flutter-web-renderer" content="html">
  <link rel="preconnect" href="https://vgzdpbwcenckmjtgfvfw.supabase.co">

  <script>
    (function() {
      const isAdmin = new URLSearchParams(window.location.search).has('admin');
      if (isAdmin) {
        var meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#141414';
        document.head.appendChild(meta);

        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'manifest.json';
        document.head.appendChild(link);

        document.title = 'Каркыра — Админ';
      } else {
        // Убрал запрет кэширования, чтобы открывалось быстро
        document.title = 'Каркыра — Ресто-Чайхана';
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    body { background-color: #141414; margin: 0; padding: 0; overflow: hidden; }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
