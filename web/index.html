<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="flutter-web-renderer" content="html">
  <link rel="preconnect" href="https://vgzdpbwcenckmjtgfvfw.supabase.co">

  <link rel="manifest" href="manifest.json?v=2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Karkyra">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=2">

  <script>
    (function() {
      const isAdmin = new URLSearchParams(window.location.search).has('admin');
      if (isAdmin) {
        var meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#141414';
        document.head.appendChild(meta);

        document.title = 'Каркыра — Админ';
      } else {
        document.title = 'Каркыра — Ресто-Чайхана';
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>
  <link rel="shortcut icon" href="favicon.png?v=2" type="image/x-icon">

  <style>
    body { background-color: #141414; margin: 0; padding: 0; overflow: hidden; }
  </style>
  <script>
    // Принудительное удаление старых Service Workers, которые могут "травить" кэш
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Old ServiceWorker unregistered');
        }
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
