<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="flutter-web-renderer" content="canvaskit">

  <script>
    (function() {
      const isAdmin = new URLSearchParams(window.location.search).has('admin');
      if (isAdmin) {
        var meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = '#141414';
        document.head.appendChild(meta);

        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'manifest.json';
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('pwa_sw.js').then((registration) => {
            console.log('PWA ServiceWorker registered');
          });
        }
        document.title = 'Каркыра — Админ';
      } else {
        // Убрал запрет кэширования, чтобы открывалось быстро
        document.title = 'Каркыра — Ресто-Чайхана';
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    body { background-color: #141414; margin: 0; padding: 0; overflow: hidden; }
    .main-loader {
      display: flex; justify-content: center; align-items: center;
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #141414; z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .loader-content {
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 2px solid rgba(212, 160, 67, 0.1);
      border-radius: 50%; border-top-color: #D4A043;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .loader-text {
      color: #D4A043; font-family: 'Forum', serif; font-size: 18px;
      letter-spacing: 0.4em; font-weight: 400; opacity: 0.8;
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="main-loader" id="loading-indicator">
    <div class="loader-content">
      <div class="spinner"></div>
    </div>
  </div>
  <script>
    window.addEventListener('load', function() {
      // Резервный таймер удаления загрузчика, если Flutter не успел за 10 сек
      setTimeout(function() {
        var loader = document.getElementById('loading-indicator');
        if (loader && !loader.classList.contains('loader-hidden')) {
           loader.classList.add('loader-hidden');
           setTimeout(() => loader.remove(), 500);
        }
      }, 10000);
    });

    // Функция для вызова из Dart
    window.removeFlutterLoader = function() {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.classList.add('loader-hidden');
        setTimeout(() => loader.remove(), 500);
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
